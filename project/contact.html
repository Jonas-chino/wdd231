<main>
    <section class="form-container">
        <h2>Make a Reservation</h2>
        <p>Complete the information to reserve your place with us.</p>
        
        <form action="thankyou.html" method="get" class="reservation-form">
            <label for="fname">Full name</label>
            <input type="text" id="fname" name="fname" required placeholder="john doe">

            <label for="email">Email address</label>
            <input type="email" id="email" name="email" required placeholder="youremail.com">

            <label for="date">Reservation date</label>
            <input type="date" id="date" name="date" required>

            <label for="guests">Number of people</label>
            <input type="number" id="guests" name="guests" min="1" max="20" required>

            <input type="submit" value="confirm " class="submit-btn">
        </form>
    </section>
</main>
